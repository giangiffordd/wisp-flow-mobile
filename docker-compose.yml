version: '3.8'

# ─────────────────────────────────────────────────────────────────────────────
# wisp-flow-mobile — single unified service
#
# This replaces the old two-image setup (app + separate specimens image).
# specimens_full_clean.txt is bundled directly into this image via COPY . .
#
# HOW TO RUN ON ANY PC:
#   1. Clone this repo
#   2. Find your local IP:  ipconfig | findstr "IPv4"   (Windows)
#                           ifconfig | grep "inet "      (Mac/Linux)
#   3. Set REACT_NATIVE_PACKAGER_HOSTNAME below to that IP
#   4. Run: docker compose up --build
#   5. Scan the QR code printed in terminal with Expo Go
# ─────────────────────────────────────────────────────────────────────────────

services:
  wisp-flow-mobile:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wisp-flow-mobile
    ports:
      - "8081:8081"
    volumes:
      # Mount source for live-reloading during development
      - .:/app
      # Preserve container's node_modules (don't overwrite with host's)
      - /app/node_modules
      - /app/.expo
    environment:
      - NODE_ENV=development
      # ⚠️  Set this to YOUR machine's local IP address
      #    Run: ipconfig | findstr "IPv4"  (Windows)
      - REACT_NATIVE_PACKAGER_HOSTNAME=192.168.1.9
      # Helps file watching on Windows/WSL2
      - CHOKIDAR_USEPOLLING=true
    stdin_open: true
    tty: true
