version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wisp-flow-mobile
    ports:
      - "8081:8081"
    volumes:
      # Mount the current directory for live-reloading
      - .:/app
      # Do not overwrite container's node_modules with host's node_modules
      - /app/node_modules
      - /app/.expo
    environment:
      - NODE_ENV=development
      # For Windows host + WSL2 Docker, this sometimes helps file watching:
      - CHOKIDAR_USEPOLLING=true
      - REACT_NATIVE_PACKAGER_HOSTNAME=192.168.1.9
    # Run in LAN mode and use 'expect' to automatically answer the "Proceed anonymously" prompt
    command: >
      sh -c "apk add --no-cache expect && expect -c '
      set timeout 15;
      spawn npx expo start;
      expect \"Proceed anonymously\" { 
        sleep 1;
        send \"\033\[B\"; 
        sleep 0.5;
        send \"\r\"; 
      };
      interact;
      '"
    stdin_open: true
    tty: true
